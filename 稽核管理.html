<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>稽核管理 - Audit Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f9fafb;
        }

        /* 表格滚动容器样式 */
        .table-container {
            overflow-x: auto;
            height: 600px;
            overflow-y: auto;
        }

        /* Sticky定位优化 */
        .sticky-left {
            position: sticky;
            left: 0;
            z-index: 10;
            background-color: rgb(249 250 251);
            box-shadow: 2px 0 5px -2px rgba(0,0,0,0.1);
        }

        .sticky-right {
            position: sticky;
            right: 0;
            z-index: 10;
            background-color: rgb(249 250 251);
            box-shadow: -2px 0 5px -2px rgba(0,0,0,0.1);
        }

        .sticky-top {
            position: sticky;
            top: 0;
            z-index: 5;
            background-color: rgb(249 250 251);
        }

        .sticky-corner {
            z-index: 20;
        }

        /* 对话框样式 */
        .dialog-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        .dialog-content {
            background: white;
            border-radius: 8px;
            max-width: 900px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .hidden {
            display: none !important;
        }

        /* 树形结构样式 */
        .tree-item:hover {
            background-color: #f3f4f6;
        }

        /* Select样式优化 */
        select {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="p-6 bg-gray-50 min-h-screen">
        <!-- 筛选条件区 -->
        <div class="bg-white rounded-lg shadow-sm mb-6">
            <div class="px-6 py-4">
                <div class="space-y-4">
                    <!-- 第一行 - 账号信息、状态和交易类型 -->
                    <div class="flex items-center gap-6">
                        <!-- 账号信息 -->
                        <div class="flex items-center gap-3">
                            <select id="accountInfoType" class="w-28 h-9 px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500">
                                <option value="memberId">会员ID</option>
                                <option value="username">用户名</option>
                                <option value="phone">手机号</option>
                            </select>
                            <input id="accountInfo" type="text" placeholder="请输入" class="w-48 h-9 px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500" />
                        </div>

                        <!-- 状态 -->
                        <div class="flex items-center gap-3">
                            <span class="text-sm text-gray-700">状态</span>
                            <select id="status" class="w-48 h-9 px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500">
                                <option value="all">全部</option>
                                <option value="notStarted">未开始</option>
                                <option value="inProgress">进行中</option>
                                <option value="completed">已完成</option>
                            </select>
                        </div>

                        <!-- 交易类型 -->
                        <div class="flex items-center gap-3">
                            <span class="text-sm text-gray-700">交易类型</span>
                            <select id="transactionType" class="w-48 h-9 px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500">
                                <option value="all">全部</option>
                                <option value="存款">存款</option>
                                <option value="活动">活动</option>
                                <option value="调账">调账</option>
                                <option value="奖金">奖金</option>
                                <option value="注册">注册</option>
                            </select>
                        </div>
                    </div>

                    <!-- 第二行 - 时间选择 -->
                    <div class="flex items-center gap-6">
                        <!-- 创建时间 -->
                        <div class="flex items-center gap-3">
                            <span class="text-sm text-gray-700">创建时间</span>
                            <div class="flex items-center gap-2">
                                <input id="createStartDate" type="date" value="2026-02-05" class="w-40 h-9 px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500" />
                                <span class="text-sm text-gray-600">至</span>
                                <input id="createEndDate" type="date" value="2026-02-05" class="w-40 h-9 px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500" />
                            </div>
                        </div>

                        <!-- 更新时间 -->
                        <div class="flex items-center gap-3">
                            <span class="text-sm text-gray-700">更新时间</span>
                            <div class="flex items-center gap-2">
                                <input id="updateStartDate" type="date" class="w-40 h-9 px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500" />
                                <span class="text-sm text-gray-600">至</span>
                                <input id="updateEndDate" type="date" class="w-40 h-9 px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500" />
                            </div>
                        </div>
                    </div>

                    <!-- 第三行 - 操作按钮 -->
                    <div class="flex items-center gap-3">
                        <button onclick="handleSearch()" class="h-9 px-5 border border-blue-400 text-blue-600 rounded hover:bg-blue-50 transition-colors">
                            <span class="inline-flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                                </svg>
                                查询
                            </span>
                        </button>
                        <button onclick="handleReset()" class="h-9 px-5 border border-green-400 text-green-600 rounded hover:bg-green-50 transition-colors">
                            <span class="inline-flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                                </svg>
                                重置
                            </span>
                        </button>
                        <button onclick="openAddDialog()" class="h-9 px-5 bg-red-50 text-red-600 border border-red-200 rounded hover:bg-red-100 transition-colors">
                            <span class="inline-flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                                </svg>
                                新增
                            </span>
                        </button>
                        <button onclick="openGlobalSettingsDialog()" class="h-9 px-5 border border-purple-400 text-purple-600 rounded hover:bg-purple-50 transition-colors">
                            <span class="inline-flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                </svg>
                                稽核全局设置
                            </span>
                        </button>
                        <button class="h-9 px-5 border border-orange-400 text-orange-600 rounded hover:bg-orange-50 transition-colors">
                            <span class="inline-flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                </svg>
                                表头显示设置
                            </span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 数据表格 -->
        <div class="bg-white rounded-lg shadow-sm">
            <div class="table-container">
                <table class="w-full border-collapse min-w-[2400px]">
                    <thead>
                        <tr class="bg-gray-50 border-b">
                            <th class="sticky-left sticky-top sticky-corner px-4 py-3 text-left text-sm font-medium text-gray-700 whitespace-nowrap border-r bg-gray-100">用户名</th>
                            <th class="sticky-top px-4 py-3 text-left text-sm font-medium text-gray-700 whitespace-nowrap border-r bg-gray-50">交易类型</th>
                            <th class="sticky-top px-4 py-3 text-left text-sm font-medium text-gray-700 whitespace-nowrap border-r bg-gray-50">名称</th>
                            <th class="sticky-top px-4 py-3 text-left text-sm font-medium text-gray-700 whitespace-nowrap border-r bg-gray-50">币种</th>
                            <th class="sticky-top px-4 py-3 text-right text-sm font-medium text-gray-700 whitespace-nowrap border-r bg-gray-50">交易金额</th>
                            <th class="sticky-top px-4 py-3 text-center text-sm font-medium text-gray-700 whitespace-nowrap border-r bg-gray-50">稽核倍数</th>
                            <th class="sticky-top px-4 py-3 text-right text-sm font-medium text-gray-700 whitespace-nowrap border-r bg-gray-50">稽核金额</th>
                            <th class="sticky-top px-4 py-3 text-right text-sm font-medium text-gray-700 whitespace-nowrap border-r bg-gray-50">已稽核</th>
                            <th class="sticky-top px-4 py-3 text-right text-sm font-medium text-gray-700 whitespace-nowrap border-r bg-gray-50">未稽核</th>
                            <th class="sticky-top px-4 py-3 text-right text-sm font-medium text-gray-700 whitespace-nowrap border-r bg-gray-50">稽核调整</th>
                            <th class="sticky-top px-4 py-3 text-left text-sm font-medium text-gray-700 whitespace-nowrap border-r bg-gray-50">备注</th>
                            <th class="sticky-top px-4 py-3 text-center text-sm font-medium text-gray-700 whitespace-nowrap border-r bg-gray-50">状态</th>
                            <th class="sticky-top px-4 py-3 text-left text-sm font-medium text-gray-700 whitespace-nowrap border-r bg-gray-50">解除设置</th>
                            <th class="sticky-top px-4 py-3 text-left text-sm font-medium text-gray-700 whitespace-nowrap border-r bg-gray-50">操作人</th>
                            <th class="sticky-top px-4 py-3 text-left text-sm font-medium text-gray-700 whitespace-nowrap border-r bg-gray-50">操作内容</th>
                            <th class="sticky-top px-4 py-3 text-left text-sm font-medium text-gray-700 whitespace-nowrap border-r bg-gray-50">创建/更新时间</th>
                            <th class="sticky-right sticky-top sticky-corner px-4 py-3 text-center text-sm font-medium text-gray-700 whitespace-nowrap bg-gray-100">操作</th>
                        </tr>
                    </thead>
                    <tbody id="auditTableBody">
                        <!-- 表格数据由JavaScript动态生成 -->
                    </tbody>
                </table>
            </div>
            
            <!-- 分页控件 -->
            <div class="flex items-center justify-between px-4 py-3 border-t bg-gray-50">
                <div class="flex items-center gap-2 text-sm text-gray-600">
                    <span>共 <span id="totalCount">0</span> 条</span>
                </div>
                
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2">
                        <select class="w-[120px] h-8 px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500">
                            <option value="10">10条/页</option>
                            <option value="20">20条/页</option>
                            <option value="50">50条/页</option>
                            <option value="100">100条/页</option>
                        </select>
                    </div>
                    
                    <div class="flex items-center gap-2">
                        <button disabled class="h-8 w-8 p-0 border border-gray-300 rounded text-sm hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">&lt;</button>
                        <button class="h-8 w-8 p-0 bg-blue-500 text-white rounded text-sm hover:bg-blue-600">1</button>
                        <button class="h-8 w-8 p-0 border border-gray-300 rounded text-sm hover:bg-gray-50">&gt;</button>
                    </div>
                    
                    <div class="flex items-center gap-2 text-sm text-gray-600">
                        <span>前往</span>
                        <input type="number" value="1" class="w-16 h-8 px-2 text-center text-sm border border-gray-300 rounded focus:outline-none focus:border-blue-500" />
                        <span>页</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增稽核弹窗 -->
    <div id="addDialog" class="dialog-overlay hidden">
        <div class="dialog-content">
            <div class="px-6 py-4 border-b">
                <h2 class="text-xl font-semibold">新增稽核信息</h2>
                <p class="text-sm text-gray-500 mt-1">请填写以下信息以新增稽核记录</p>
            </div>
            
            <div class="px-6 py-4 space-y-4">
                <!-- 账号信息搜索 -->
                <div class="flex items-center gap-4">
                    <label class="w-36 text-right shrink-0 text-sm">账号信息</label>
                    <div class="flex gap-2 flex-1">
                        <input id="addAccountInfo" type="text" placeholder="会员ID或账号信息" class="flex-1 h-9 px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500" />
                        <button onclick="searchUserInfo()" class="h-9 px-4 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm whitespace-nowrap">搜索</button>
                    </div>
                </div>

                <!-- 用户信息显示 -->
                <div class="flex items-center gap-4">
                    <label class="w-36 text-right shrink-0 text-sm">用户信息</label>
                    <div class="flex gap-4 flex-1">
                        <div class="flex items-center gap-2 flex-1">
                            <span class="text-sm text-gray-600 whitespace-nowrap">余额</span>
                            <input id="userBalance" readonly placeholder="-" class="flex-1 h-9 px-3 py-2 border border-gray-300 rounded text-sm bg-gray-50" />
                        </div>
                        <div class="flex items-center gap-2 flex-1">
                            <span class="text-sm text-gray-600 whitespace-nowrap">剩余打码</span>
                            <input id="userWager" readonly placeholder="-" class="flex-1 h-9 px-3 py-2 border border-gray-300 rounded text-sm bg-gray-50" />
                        </div>
                    </div>
                </div>

                <!-- 交易类型 -->
                <div class="flex items-center gap-4">
                    <label class="w-36 text-right shrink-0 text-sm">交易类型</label>
                    <select id="addTransactionType" onchange="handleTransactionTypeChange()" class="flex-1 h-9 px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500">
                        <option value="">请选择交易类型</option>
                        <option value="deposit">存款</option>
                        <option value="activity">活动</option>
                        <option value="adjustment">调账</option>
                        <option value="bonus">奖金</option>
                        <option value="register">注册</option>
                    </select>
                </div>

                <!-- 活动名称 -->
                <div id="activityNameSection" class="hidden flex items-center gap-4">
                    <label class="w-36 text-right shrink-0 text-sm">名称</label>
                    <select id="addActivityName" onchange="handleActivityNameChange()" class="flex-1 h-9 px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500">
                        <option value="">请选择活动名称</option>
                    </select>
                </div>

                <!-- 自定义活动名称 -->
                <div id="customActivityNameSection" class="hidden flex items-center gap-4">
                    <label class="w-36 text-right shrink-0 text-sm">自定义名称</label>
                    <input id="customActivityName" type="text" placeholder="请输入自定义活动名称" class="flex-1 h-9 px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500" />
                </div>

                <!-- 交易金额 -->
                <div class="flex items-center gap-4">
                    <label class="w-36 text-right shrink-0 text-sm">交易金额</label>
                    <input id="transactionAmount" type="number" placeholder="请输入交易金额" class="flex-1 h-9 px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500" />
                </div>

                <!-- 稽核方式 -->
                <div class="flex items-start gap-4">
                    <label class="w-36 text-right shrink-0 text-sm pt-2">稽核方式</label>
                    <div class="flex-1 space-y-3">
                        <div class="flex items-center gap-6">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="auditMethod" value="amount" checked onchange="handleAuditMethodChange()" class="w-4 h-4" />
                                <span class="text-sm">金额稽核</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="auditMethod" value="multiplier" onchange="handleAuditMethodChange()" class="w-4 h-4" />
                                <span class="text-sm">倍数稽核</span>
                            </label>
                        </div>
                        <input id="auditValue" type="number" placeholder="请输入稽核金额" class="w-full h-9 px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500" />
                    </div>
                </div>

                <!-- 稽核解除设置 -->
                <div class="flex items-center gap-4">
                    <label class="w-36 text-right shrink-0 text-sm">稽核解除设置</label>
                    <div class="flex items-center gap-6 flex-1">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="autoRelease" value="yes" checked onchange="handleAutoReleaseChange()" class="w-4 h-4" />
                            <span class="text-sm">输光自动解除</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="autoRelease" value="no" onchange="handleAutoReleaseChange()" class="w-4 h-4" />
                            <span class="text-sm">输光不自动解除</span>
                        </label>
                    </div>
                </div>

                <!-- 稽核自动解除额度 -->
                <div id="autoReleaseAmountSection" class="pl-36">
                    <div class="flex items-center gap-4">
                        <label class="w-36 text-right shrink-0 text-sm">稽核自动解除额度</label>
                        <input id="autoReleaseAmount" type="number" placeholder="请输入稽核自动解除额度" class="flex-1 h-9 px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500" />
                    </div>
                    <div class="flex items-start gap-4 mt-2">
                        <div class="w-36"></div>
                        <p class="text-xs text-red-600 flex-1">重要说明 当玩家总余额低于以上金额时(包含余额宝)，该玩家被视为亏光</p>
                    </div>
                </div>

                <!-- 解除方式 -->
                <div id="releaseModeSection" class="pl-36">
                    <div class="flex items-center gap-4">
                        <label class="w-36 text-right shrink-0 text-sm">解除方式</label>
                        <div class="flex items-center gap-6 flex-1">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="releaseMode" value="deposit" onchange="handleReleaseModeChange()" class="w-4 h-4" />
                                <span class="text-sm">充值后解除</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="releaseMode" value="immediate" checked onchange="handleReleaseModeChange()" class="w-4 h-4" />
                                <span class="text-sm">立刻解除</span>
                            </label>
                        </div>
                    </div>
                    <div id="depositTip" class="hidden flex items-start gap-4 mt-2">
                        <div class="w-36"></div>
                        <p class="text-xs text-red-600 flex-1">充值任意金额解除</p>
                    </div>
                </div>

                <!-- 备注 -->
                <div class="flex items-start gap-4">
                    <label class="w-36 text-right shrink-0 text-sm pt-2">备注</label>
                    <textarea id="addRemark" placeholder="请输入备注信息" class="flex-1 min-h-[80px] px-3 py-2 border border-gray-300 rounded text-sm resize-none focus:outline-none focus:border-blue-500"></textarea>
                </div>
            </div>

            <div class="px-6 py-4 border-t bg-gray-50 flex justify-end gap-3">
                <button onclick="closeAddDialog()" class="px-6 py-2 border border-gray-300 text-gray-700 rounded hover:bg-gray-100 text-sm">取消</button>
                <button onclick="submitAdd()" class="px-6 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm">确定</button>
            </div>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div id="detailDialog" class="dialog-overlay hidden">
        <div class="dialog-content">
            <div class="px-6 py-4 border-b">
                <h2 class="text-xl font-semibold">稽核记录详情</h2>

        // 搜索功能

            const accountInfo = document.getElementById('accountInfo').value.trim().toLowerCase();
            const status = document.getElementById('status').value;
            const transactionType = document.getElementById('transactionType').value;
            const createStartDate = document.getElementById('createStartDate').value;
            const createEndDate = document.getElementById('createEndDate').value;

            filteredRecords = auditRecords.filter(record => {
                let match = true;

                if (accountInfo) {
                    match = match && (record.username.toLowerCase().includes(accountInfo) || record.memberId.includes(accountInfo));
                }

                if (status !== 'all') {
                    const statusMap = { notStarted: '未开始', inProgress: '进行中', completed: '已完成' };
                    match = match && (record.status === statusMap[status]);
                }

                if (transactionType !== 'all') {
                    match = match && (record.transactionType === transactionType);
                }

                if (createStartDate && createEndDate) {
                    const recordDate = record.createTime.split(' ')[0];
                    match = match && (recordDate >= createStartDate && recordDate <= createEndDate);
                }

                return match;
            });

            renderTable();
        }

        // 更新调整预览
        function updateAdjustPreview() {
            const adjustType = document.querySelector('input[name="adjustType"]:checked').value;
            const adjustAmount = parseFloat(document.getElementById('adjustAmount').value) || 0;
            const original = parseFloat(selectedRecord.auditAmount.replace(/,/g, ''));
            
            // 更新填入原金额按钮显示
            const fillBtn = document.getElementById('fillOriginalBtn');
            const adjustTip = document.getElementById('adjustTip');
            
            if (adjustType === 'decrease') {
                fillBtn.classList.remove('hidden');
                adjustTip.textContent = `请输入正数，最大不超过原稽核金额 ${selectedRecord.currency} ${selectedRecord.auditAmount}`;
            } else {
                fillBtn.classList.add('hidden');
                adjustTip.textContent = '请输入要增加的稽核金额';
            }
            
            // 计算调整后金额
            const result = adjustType === 'increase' ? original + adjustAmount : original - adjustAmount;
            const adjustedAmountEl = document.getElementById('adjustedAmount');
            adjustedAmountEl.textContent = `${selectedRecord.currency} ${result.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            adjustedAmountEl.className = `text-base font-semibold ${adjustType === 'increase' ? 'text-red-600' : 'text-green-600'}`;
        }

        // 填入原金额
        function fillOriginalAmount() {
            const original = parseFloat(selectedRecord.auditAmount.replace(/,/g, ''));
            document.getElementById('adjustAmount').value = original;
            updateAdjustPreview();
        }
