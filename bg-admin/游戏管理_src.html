<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>游戏管理</title>
<link rel="stylesheet" href="./element-plus.css">
<link rel="stylesheet" href="./styles.css">
<style>
  html, body, #app { height: 100%; margin: 0; }
  .layout { height: 100%; }
  [v-cloak] { display: none; }
  /* 列设置弹层 */
  .col-setting { padding: 4px 0; }
  .col-setting-header { padding: 0 8px 8px; border-bottom: 1px solid #f1f5f9; margin-bottom: 6px; }
  .col-setting .el-checkbox { display: flex; padding: 4px 8px; margin: 0; }
  /* 厂商/游戏限制分组复选 */
  .grp-title { font-size: 14px; font-weight: 600; color: #1f2937; margin: 14px 0 8px; }
  .grp-box { display: flex; flex-wrap: wrap; gap: 6px 22px; }
  /* JSON 单元格 */
  .json-cell { font-family: Consolas, monospace; font-size: 12px; color: #6b7280; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: inline-block; vertical-align: bottom; }
</style>
</head>
<body>
<div id="app" v-cloak>
  <el-container class="layout">
    <!-- 左侧菜单：仅「游戏管理」可点，其余分组置灰 -->
    <el-aside :width="collapsed ? '64px' : '220px'" class="aside">
      <div class="logo"><span class="logo-badge">66</span><span v-show="!collapsed" class="logo-text">Lottery 后台</span></div>
      <el-scrollbar>
        <el-menu :default-active="activeMenu" :collapse="collapsed" :collapse-transition="false"
          background-color="#1f2937" text-color="#d1d5db" active-text-color="#ffffff" @select="onMenuSelect">
          <el-sub-menu index="member" disabled><template #title><el-icon><User/></el-icon><span>会员管理</span></template></el-sub-menu>
          <el-sub-menu index="finance" disabled><template #title><el-icon><Money/></el-icon><span>财务管理</span></template></el-sub-menu>
          <el-sub-menu index="game"><template #title><el-icon><Grid/></el-icon><span>游戏管理</span></template>
            <el-menu-item index="game-restrict">游戏限制</el-menu-item>
            <el-menu-item index="game-list">游戏列表</el-menu-item>
            <el-menu-item index="game-classify">游戏分类</el-menu-item>
            <el-menu-item index="game-manufacturer">游戏厂商</el-menu-item>
            <el-menu-item index="game-keyword">搜索关键词</el-menu-item>
          </el-sub-menu>
          <el-sub-menu index="tripartite" disabled><template #title><el-icon><Connection/></el-icon><span>三方游戏</span></template></el-sub-menu>
          <el-sub-menu index="rebate" disabled><template #title><el-icon><Present/></el-icon><span>活动福利</span></template></el-sub-menu>
          <el-sub-menu index="agent" disabled><template #title><el-icon><Share/></el-icon><span>代理管理</span></template></el-sub-menu>
          <el-sub-menu index="ops" disabled><template #title><el-icon><Promotion/></el-icon><span>运营管理</span></template></el-sub-menu>
          <el-sub-menu index="quiz" disabled><template #title><el-icon><Odometer/></el-icon><span>预测系统</span></template></el-sub-menu>
          <el-sub-menu index="site" disabled><template #title><el-icon><Monitor/></el-icon><span>站点设置</span></template></el-sub-menu>
        </el-menu>
      </el-scrollbar>
    </el-aside>

    <el-container>
      <el-header class="header">
        <div class="header-left">
          <el-icon class="collapse-btn" @click="collapsed=!collapsed"><Fold v-if="!collapsed"/><Expand v-else/></el-icon>
          <el-breadcrumb separator="/">
            <el-breadcrumb-item>首页</el-breadcrumb-item>
            <el-breadcrumb-item>游戏管理</el-breadcrumb-item>
            <el-breadcrumb-item>{{ crumb }}</el-breadcrumb-item>
          </el-breadcrumb>
        </div>
        <div class="header-right">
          <span class="tz-trigger"><el-icon><Clock/></el-icon> UTC+05:30</span>
          <el-button text circle :icon="QuestionFilled" class="icon-btn" />
          <el-popover placement="bottom-end" :width="340" trigger="click">
            <template #reference>
              <span class="pending-trigger"><el-badge :value="totalPending" :max="99" class="header-badge">
                <el-button size="small" type="primary" plain :icon="Bell">待处理任务</el-button></el-badge></span>
            </template>
            <div class="pending-task-list"><div class="pending-task-header">待处理任务</div>
              <div class="pending-task-item" v-for="t in pendingTasks" :key="t.key">
                <span class="task-label">{{ t.label }}</span>
                <span class="task-count">待处理：<b :class="{hot:t.count>0}">{{ t.count }}</b></span>
                <el-link type="primary" :underline="false">去处理</el-link></div></div>
          </el-popover>
          <el-dropdown><span class="user-info"><el-avatar :size="28" class="user-avatar">C</el-avatar><span>cici</span><el-icon class="user-arrow"><ArrowDown/></el-icon></span>
            <template #dropdown><el-dropdown-menu><el-dropdown-item>个人中心</el-dropdown-item><el-dropdown-item divided>退出登录</el-dropdown-item></el-dropdown-menu></template>
          </el-dropdown>
        </div>
      </el-header>

      <el-main class="main">
        <game-restrict   v-if="activeMenu==='game-restrict'"></game-restrict>
        <game-list       v-else-if="activeMenu==='game-list'"></game-list>
        <game-classify   v-else-if="activeMenu==='game-classify'"></game-classify>
        <game-manufacturer v-else-if="activeMenu==='game-manufacturer'"></game-manufacturer>
        <game-keyword    v-else-if="activeMenu==='game-keyword'"></game-keyword>
      </el-main>
    </el-container>
  </el-container>
</div>

<!-- ══════════ 游戏限制 ══════════ -->
<template id="game-restrict-tpl">
<div class="page">
  <el-card shadow="never" class="table-card">
    <el-table :data="rows" border stripe style="width:100%">
      <el-table-column label="游戏限制" min-width="220">
        <template #default><el-button link type="primary" @click="open('view')">查看</el-button></template>
      </el-table-column>
      <el-table-column label="状态" width="160" align="center">
        <template #default="{row}"><el-tag size="small" :type="row.enabled?'danger':'info'">{{ row.enabled?'限制中':'未限制' }}</el-tag></template>
      </el-table-column>
      <el-table-column prop="createTime" label="创建时间" min-width="180" />
      <el-table-column prop="updateTime" label="更新时间" min-width="180" />
      <el-table-column label="操作" width="120" align="center" fixed="right">
        <template #default><el-button link type="primary" size="small" @click="open('edit')">编辑</el-button></template>
      </el-table-column>
    </el-table>
  </el-card>

  <!-- 配置弹窗（查看=只读 / 编辑=可改）合并字段：状态开关 + 分类多选 + 分组指定游戏 -->
  <el-dialog v-model="dlg.visible" :title="dlg.mode==='view'?'游戏限制配置（查看）':'修改游戏限制配置'"
    width="900px" align-center :close-on-click-modal="false">
    <el-scrollbar max-height="64vh">
      <el-form label-width="130px" label-position="right" class="dlg-form" :disabled="dlg.mode==='view'">
        <el-form-item label="游戏限制(状态)">
          <el-switch v-model="form.enabled" />
          <span style="margin-left:10px;color:#909399;font-size:12px;">开启后，下方勾选的分类 / 游戏将被限制</span>
        </el-form-item>
        <el-form-item label="游戏限制(分类)">
          <el-checkbox-group v-model="form.cats">
            <el-checkbox v-for="c in cats" :key="c" :value="c">{{ c }}</el-checkbox>
          </el-checkbox-group>
        </el-form-item>
        <el-form-item label="指定游戏(厂商/游戏)">
          <div style="width:100%">
            <div v-for="g in groups" :key="g.name">
              <div class="grp-title">{{ g.name }}</div>
              <el-checkbox-group v-model="form.picked" class="grp-box">
                <el-checkbox v-for="it in g.items" :key="it" :value="it">{{ it }}</el-checkbox>
              </el-checkbox-group>
            </div>
          </div>
        </el-form-item>
      </el-form>
    </el-scrollbar>
    <template #footer>
      <el-button @click="dlg.visible=false">{{ dlg.mode==='view'?'关闭':'取消' }}</el-button>
      <el-button v-if="dlg.mode==='edit'" type="primary" @click="save">确定</el-button>
    </template>
  </el-dialog>
</div>
</template>

<!-- ══════════ 游戏列表 ══════════ -->
<template id="game-list-tpl">
<div class="page">
  <!-- 筛选 -->
  <el-card shadow="never" class="filter-card">
    <el-form :model="filters" label-position="right" label-width="auto" size="default" class="filter-form">
      <el-row :gutter="12" class="filter-row">
        <el-col :span="6"><el-form-item label="游戏厂商"><el-select v-model="filters.manufacturer" clearable filterable placeholder="请选择" style="width:100%"><el-option v-for="m in manufacturers" :key="m" :value="m" :label="m"/></el-select></el-form-item></el-col>
        <el-col :span="6"><el-form-item label="游戏名称(中文)"><el-input v-model="filters.nameCn" placeholder="请输入游戏名称(中文)" clearable/></el-form-item></el-col>
        <el-col :span="6"><el-form-item label="游戏名称(自定义)"><el-input v-model="filters.nameCustom" placeholder="请输入游戏名称(自定义)" clearable/></el-form-item></el-col>
        <el-col :span="6"><el-form-item label="游戏状态"><select v-model="filters.gameStatus" class="f-sel"><option value="">全部</option><option value="enabled">启用</option><option value="disabled">禁用</option></select></el-form-item></el-col>
      </el-row>
      <template v-if="expanded">
        <el-row :gutter="12" class="filter-row">
          <el-col :span="6"><el-form-item label="维护状态"><select v-model="filters.maintainStatus" class="f-sel"><option value="">全部</option><option value="ok">未维护</option><option value="maintain">维护中</option></select></el-form-item></el-col>
          <el-col :span="6"><el-form-item label="是否热门"><select v-model="filters.isHot" class="f-sel"><option value="">全部</option><option value="yes">是</option><option value="no">否</option></select></el-form-item></el-col>
          <el-col :span="6"><el-form-item label="是否最新"><select v-model="filters.isNew" class="f-sel"><option value="">全部</option><option value="yes">是</option><option value="no">否</option></select></el-form-item></el-col>
          <el-col :span="6"><el-form-item label="是否jackpot"><select v-model="filters.isJackpot" class="f-sel"><option value="">全部</option><option value="yes">是</option><option value="no">否</option></select></el-form-item></el-col>
        </el-row>
      </template>
      <div class="filter-actions"><div></div><div class="filter-actions-right">
        <el-button type="primary" :icon="Search" @click="search">查询</el-button>
        <el-button :icon="Refresh" @click="reset">重置</el-button>
        <el-button type="success" :icon="Download" @click="ElMessage.success('导出任务已提交')">导出</el-button>
        <el-button link type="primary" @click="expanded=!expanded">{{ expanded?'收起':'展开' }}<el-icon><ArrowUp v-if="expanded"/><ArrowDown v-else/></el-icon></el-button>
      </div></div>
    </el-form>
  </el-card>

  <!-- 表格 -->
  <el-card shadow="never" class="table-card">
    <div class="table-toolbar">
      <div class="toolbar-left">
        <el-button type="success" plain :disabled="!selection.length" @click="batch('enabled')">批量启用</el-button>
        <el-button type="danger" plain :disabled="!selection.length" @click="batch('disabled')">批量禁用</el-button>
        <el-button plain :icon="RefreshRight" @click="ElMessage.success('游戏列表缓存已刷新')">刷新缓存</el-button>
      </div>
      <div class="toolbar-right">
        <el-button type="primary" :icon="Plus" @click="openAdd">新增</el-button>
        <el-popover placement="bottom-end" :width="240" trigger="click">
          <template #reference><el-button :icon="Operation" circle title="列设置"/></template>
          <div class="col-setting">
            <div class="col-setting-header"><el-checkbox :model-value="allCols" :indeterminate="someCols" @change="toggleAllCols">全选</el-checkbox></div>
            <el-scrollbar max-height="320px"><el-checkbox v-for="c in columnOptions" :key="c.prop" v-model="c.visible" :disabled="c.required">{{ c.label }}</el-checkbox></el-scrollbar>
          </div>
        </el-popover>
        <el-button :icon="RefreshRight" circle title="刷新" @click="search"/>
      </div>
    </div>
    <el-table :data="paged" border stripe style="width:100%" @selection-change="r=>selection=r">
      <el-table-column type="selection" width="42" align="center" fixed/>
      <el-table-column v-if="vis('id')" prop="id" label="主键id" width="80" align="center" fixed/>
      <el-table-column v-if="vis('manufacturer')" prop="manufacturer" label="游戏厂商" width="130" />
      <el-table-column v-if="vis('name')" label="游戏名称" min-width="170">
        <template #default="{row}">
          <div class="multi-cell">
            <div class="mc-row"><span class="mc-label">中文：</span><span class="mc-val">{{ row.nameCn }}</span></div>
            <div class="mc-row"><span class="mc-label">自定义：</span><span class="mc-val mc-sub">{{ row.nameCustom }}</span></div>
          </div>
        </template>
      </el-table-column>
      <el-table-column v-if="vis('icon')" label="图标" width="70" align="center">
        <template #default="{row}"><el-image v-if="row.icon" :src="row.icon" style="width:38px;height:38px;border-radius:4px" fit="cover"><template #error><span class="cell-dash">—</span></template></el-image><span v-else class="cell-dash">—</span></template>
      </el-table-column>
      <el-table-column v-if="vis('code')" prop="code" label="游戏编码" width="120" />
      <el-table-column v-if="vis('gameStatus')" label="游戏状态" width="90" align="center">
        <template #default="{row}"><el-tag size="small" :type="row.gameStatus==='enabled'?'success':'info'">{{ row.gameStatus==='enabled'?'启用':'禁用' }}</el-tag></template>
      </el-table-column>
      <el-table-column v-if="vis('maintainStatus')" label="维护状态" width="90" align="center">
        <template #default="{row}"><el-tag size="small" :type="row.maintainStatus==='ok'?'success':'warning'" effect="plain">{{ row.maintainStatus==='ok'?'未维护':'维护中' }}</el-tag></template>
      </el-table-column>
      <el-table-column v-if="vis('flags')" label="标签" width="150">
        <template #default="{row}">
          <div style="display:flex;gap:4px;flex-wrap:wrap">
            <el-tag v-if="row.isHot==='yes'" size="small" type="danger" effect="plain">热门 {{ row.hotSort }}</el-tag>
            <el-tag v-if="row.isNew==='yes'" size="small" type="success" effect="plain">最新 {{ row.newSort }}</el-tag>
            <el-tag v-if="row.isRecommend==='yes'" size="small" type="primary" effect="plain">推荐 {{ row.recommendSort }}</el-tag>
            <el-tag v-if="row.isJackpot==='yes'" size="small" type="warning" effect="plain">JP {{ row.jackpotSort }}</el-tag>
            <span v-if="row.isHot!=='yes'&&row.isNew!=='yes'&&row.isRecommend!=='yes'&&row.isJackpot!=='yes'" class="cell-dash">—</span>
          </div>
        </template>
      </el-table-column>
      <el-table-column v-if="vis('sort')" prop="sort" label="排序" width="72" align="center" sortable />
      <el-table-column v-if="vis('rtp')" prop="rtp" label="赔率" width="80" align="right" />
      <el-table-column v-if="vis('maxWin')" prop="maxWin" label="最高中奖金额" width="130" align="right" />
      <el-table-column v-if="vis('addTime')" prop="addTime" label="添加时间" width="160" />
      <el-table-column v-if="vis('updateTime')" prop="updateTime" label="最后更新时间" width="160" />
      <el-table-column label="操作" width="200" align="center" fixed="right">
        <template #default="{row}">
          <div class="op-cell">
            <el-button link type="primary" size="small" @click="openEdit(row)">修改</el-button>
            <template v-if="row.self">
              <el-button link type="primary" size="small" @click="openPlayway(row)">玩法配置</el-button>
              <el-dropdown trigger="click">
                <el-button link type="primary" size="small">更多<el-icon style="margin-left:2px"><ArrowDown/></el-icon></el-button>
                <template #dropdown><el-dropdown-menu>
                  <el-dropdown-item @click="openOdds(row)">赔率配置</el-dropdown-item>
                  <el-dropdown-item divided style="color:#ef4444" @click="doDelete(row)">删除</el-dropdown-item>
                </el-dropdown-menu></template>
              </el-dropdown>
            </template>
            <el-button v-else link type="danger" size="small" @click="doDelete(row)">删除</el-button>
          </div>
        </template>
      </el-table-column>
    </el-table>
    <div class="pagination-bar"><el-pagination v-model:current-page="pag.page" v-model:page-size="pag.size"
      :total="filtered.length" :page-sizes="[10,20,50,100]" layout="total, sizes, prev, pager, next, jumper" background /></div>
  </el-card>

  <!-- 修改/新增（单列长表单，18 字段，全保留） -->
  <el-dialog v-model="editDlg.visible" :title="editDlg.mode==='add'?'新增游戏':'修改游戏'" width="520px" align-center :close-on-click-modal="false" destroy-on-close>
    <el-scrollbar max-height="62vh"><el-form class="dlg-form" label-width="118px" label-position="right" style="padding-right:8px">
      <el-form-item label="游戏厂商" required><el-select v-model="editDlg.form.manufacturer" filterable style="width:100%"><el-option v-for="m in manufacturers" :key="m" :value="m" :label="m"/></el-select></el-form-item>
      <el-form-item label="游戏名称(中文)" required><el-input v-model="editDlg.form.nameCn"/></el-form-item>
      <el-form-item label="游戏名称(自定义)" required><el-input v-model="editDlg.form.nameCustom"/></el-form-item>
      <el-form-item label="图标" required><el-input v-model="editDlg.form.icon" placeholder="icon 路径"><template #append><el-button>上传</el-button></template></el-input></el-form-item>
      <el-form-item label="游戏编码" required><el-input v-model="editDlg.form.code" :disabled="editDlg.mode==='edit'"/></el-form-item>
      <el-form-item label="游戏状态" required><select v-model="editDlg.form.gameStatus" class="f-sel" style="width:100%"><option value="enabled">启用</option><option value="disabled">禁用</option></select></el-form-item>
      <el-form-item label="维护状态" required><select v-model="editDlg.form.maintainStatus" class="f-sel" style="width:100%"><option value="ok">未维护</option><option value="maintain">维护中</option></select></el-form-item>
      <el-form-item label="排序" required><el-input v-model="editDlg.form.sort"/></el-form-item>
      <el-form-item label="是否热门" required><select v-model="editDlg.form.isHot" class="f-sel" style="width:100%"><option value="yes">是</option><option value="no">否</option></select></el-form-item>
      <el-form-item label="热门排序" required><el-input v-model="editDlg.form.hotSort"/></el-form-item>
      <el-form-item label="是否推荐" required><select v-model="editDlg.form.isRecommend" class="f-sel" style="width:100%"><option value="yes">推荐</option><option value="no">否</option></select></el-form-item>
      <el-form-item label="推荐排序"><el-input v-model="editDlg.form.recommendSort"/></el-form-item>
      <el-form-item label="是否最新" required><select v-model="editDlg.form.isNew" class="f-sel" style="width:100%"><option value="yes">是</option><option value="no">否</option></select></el-form-item>
      <el-form-item label="最新排序" required><el-input v-model="editDlg.form.newSort"/></el-form-item>
      <el-form-item label="jackpot"><select v-model="editDlg.form.isJackpot" class="f-sel" style="width:100%"><option value="yes">是</option><option value="no">否</option></select></el-form-item>
      <el-form-item label="jackpot排序"><el-input v-model="editDlg.form.jackpotSort"/></el-form-item>
      <el-form-item label="赔率"><el-input v-model="editDlg.form.rtp"/></el-form-item>
      <el-form-item label="最高中奖金额"><el-input v-model="editDlg.form.maxWin"/></el-form-item>
    </el-form></el-scrollbar>
    <template #footer><el-button @click="editDlg.visible=false">取消</el-button><el-button type="primary" @click="confirmEdit">确定</el-button></template>
  </el-dialog>

  <!-- 玩法配置 -->
  <el-dialog v-model="pwDlg.visible" :title="'玩法配置 — '+pwDlg.gameName" width="1000px" align-center :close-on-click-modal="false" destroy-on-close>
    <div class="table-toolbar"><div class="toolbar-left">
      <el-button type="primary" :icon="Plus" size="small" @click="pwAdd">新增</el-button>
      <el-button type="danger" plain size="small" :disabled="!pwDlg.sel.length" @click="pwDelSel">删除</el-button>
    </div><div class="toolbar-right"></div></div>
    <el-table :data="pwDlg.data" border stripe size="small" style="width:100%" @selection-change="r=>pwDlg.sel=r">
      <el-table-column type="selection" width="42" align="center"/>
      <el-table-column prop="name" label="玩法名称" min-width="150"/>
      <el-table-column prop="time" label="游戏时间" width="90" align="center"/>
      <el-table-column prop="bet" label="投注金额" min-width="150"/>
      <el-table-column prop="multi" label="投注倍数" min-width="170"/>
      <el-table-column label="状态" width="80" align="center"><template #default="{row}"><el-tag size="small" :type="row.enabled?'success':'danger'" effect="plain">{{ row.enabled?'启用':'禁用' }}</el-tag></template></el-table-column>
      <el-table-column prop="sort" label="排序" width="64" align="center"/>
      <el-table-column prop="rtp" label="返奖率" width="80" align="right"/>
      <el-table-column prop="totalBet" label="投注总金额" width="100" align="right"/>
      <el-table-column prop="totalWin" label="中奖总金额" width="100" align="right"/>
